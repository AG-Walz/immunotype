name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Build package
      run: uv build

    - name: Check package
      run: uvx twine check dist/*

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  test-release:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Test installation
      run: |
        uv venv test-env
        VIRTUAL_ENV=test-env uv pip install dist/*.whl
        VIRTUAL_ENV=test-env uv run immunotype --help

  publish-pypi:
    runs-on: ubuntu-latest
    needs: [build, test-release]
    if: github.event.release.prerelease == false
    environment:
      name: pypi
      url: https://pypi.org/p/immunotype
    permissions:
      id-token: write
      attestations: write

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Generate artifact attestations
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: dist/*

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        attestations: true
